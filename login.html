<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TagDev — Sign In</title>
  <meta name="description" content="Sign in to your TagDev POS dashboard.">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Noto+Kufi+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: #0D1420; color: #fff; min-height: 100vh; overflow-x: hidden; }

    /* ─── Gradient text ─── */
    .g-text {
      background: linear-gradient(90deg, #2BE3B7 0%, #11ABE2 50%, #0086FF 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* ─── Nav ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(13,20,32,.85); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-inner img { height: 36px; }
    .nav-back {
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,.5); font-size: 13px; text-decoration: none;
      padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,.1);
      transition: all .2s;
    }
    .nav-back:hover { color: #fff; border-color: rgba(17,171,226,.4); background: rgba(17,171,226,.06); }

    /* ─── Buttons ─── */
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: linear-gradient(90deg, #11ABE2, #0086FF);
      color: #fff; font-weight: 600; padding: 14px 28px; border-radius: 12px;
      border: none; cursor: pointer; font-family: inherit; font-size: 15px;
      transition: all .3s; text-decoration: none; width: 100%;
      box-shadow: 0 4px 20px rgba(0,134,255,.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,134,255,.45); }
    .btn-primary:focus-visible { outline: 2px solid #2BE3B7; outline-offset: 2px; }

    /* ─── Particles ─── */
    #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: .3; }

    /* ─── Login Layout ─── */
    .login-section {
      position: relative; z-index: 1; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 100px 24px 60px;
    }

    /* Orbs */
    .orb {
      position: absolute; border-radius: 50%; pointer-events: none;
    }

    /* ─── Login Card ─── */
    .login-card {
      position: relative; width: 100%; max-width: 440px;
      background: #131D2E; border-radius: 24px;
      border: 1px solid rgba(255,255,255,.06);
      padding: 44px 40px;
      box-shadow: 0 24px 80px rgba(0,0,0,.3);
    }
    .login-card::before {
      content: ''; position: absolute; inset: 0; border-radius: 24px; padding: 1px;
      background: linear-gradient(135deg, rgba(43,227,183,.2), rgba(17,171,226,.08), rgba(0,134,255,.2));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
    }

    .login-card .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(43,227,183,.07); border: 1px solid rgba(43,227,183,.2);
      color: #2BE3B7; padding: 5px 14px; border-radius: 999px;
      font-size: 12px; font-weight: 500; margin-bottom: 20px;
    }
    .login-card h1 {
      font-size: 28px; font-weight: 700; margin-bottom: 6px; letter-spacing: -.3px;
    }
    .login-card .sub {
      font-size: 14px; color: rgba(255,255,255,.4); margin-bottom: 32px; line-height: 1.5;
    }

    /* ─── Social Buttons ─── */
    .social-row { display: flex; gap: 12px; margin-bottom: 24px; }
    .social-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 16px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.03);
      color: rgba(255,255,255,.7); font-family: inherit; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .2s;
    }
    .social-btn:hover { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.15); color: #fff; }
    .social-btn:focus-visible { outline: 2px solid #11ABE2; outline-offset: 2px; }

    /* ─── Divider ─── */
    .divider { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.08); }
    .divider span { font-size: 12px; color: rgba(255,255,255,.25); text-transform: uppercase; letter-spacing: 1px; }

    /* ─── Form ─── */
    .field { margin-bottom: 20px; }
    .field label {
      display: block; font-size: 13px; font-weight: 500;
      color: rgba(255,255,255,.5); margin-bottom: 8px;
    }
    .input-wrap {
      position: relative; display: flex; align-items: center;
      border: 1px solid rgba(255,255,255,.1); border-radius: 12px;
      background: rgba(255,255,255,.03); transition: all .2s;
    }
    .input-wrap:focus-within {
      border-color: rgba(17,171,226,.5);
      box-shadow: 0 0 0 3px rgba(17,171,226,.08);
      background: rgba(255,255,255,.05);
    }
    .field input {
      width: 100%; padding: 13px 16px; border: none; outline: none;
      background: transparent; font-family: inherit; font-size: 14px;
      color: #fff; border-radius: 12px;
    }
    .field input::placeholder { color: rgba(255,255,255,.2); }
    .toggle-pw {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: rgba(255,255,255,.25);
      padding: 2px; display: flex; transition: color .2s;
    }
    .toggle-pw:hover { color: rgba(255,255,255,.5); }

    /* ─── Options ─── */
    .options-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .remember {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: rgba(255,255,255,.4); cursor: pointer;
    }
    .remember input[type="checkbox"] {
      width: 16px; height: 16px; border-radius: 4px;
      accent-color: #11ABE2; cursor: pointer;
    }
    .forgot {
      font-size: 13px; color: #11ABE2; font-weight: 500; text-decoration: none;
      transition: color .2s;
    }
    .forgot:hover { color: #2BE3B7; text-decoration: underline; }

    /* ─── Sign Up ─── */
    .signup-text {
      text-align: center; margin-top: 28px;
      font-size: 14px; color: rgba(255,255,255,.35);
    }
    .signup-text a { color: #2BE3B7; font-weight: 600; text-decoration: none; }
    .signup-text a:hover { text-decoration: underline; }

    /* ─── Footer ─── */
    .login-footer {
      position: relative; z-index: 1;
      text-align: center; padding: 20px 24px 28px;
      font-size: 12px; color: rgba(255,255,255,.2);
    }

    /* ─── Focus ─── */
    a:focus-visible, button:focus-visible, input:focus-visible, summary:focus-visible {
      outline: 2px solid #11ABE2; outline-offset: 2px; border-radius: 4px;
    }

    /* ─── Language Toggle ─── */
    .lang-toggle {
      display: flex; align-items: center; border-radius: 8px; overflow: hidden;
      border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.04);
    }
    .lang-toggle button {
      padding: 6px 12px; font-size: 12px; font-weight: 600; border: none; cursor: pointer;
      background: transparent; color: rgba(255,255,255,.4); font-family: inherit;
      transition: all .25s; min-height: 36px; min-width: 36px;
    }
    .lang-toggle button.active {
      background: linear-gradient(90deg, #11ABE2, #0086FF); color: #fff;
    }

    /* ─── RTL ─── */
    html[dir="rtl"] body { font-family: 'Noto Kufi Arabic', 'DM Sans', sans-serif; }
    html[dir="rtl"] .nav-back svg { transform: scaleX(-1); }
    html[dir="rtl"] .btn-primary svg { transform: scaleX(-1); }

    /* ─── Reduced Motion ─── */
    @media (prefers-reduced-motion: reduce) {
      #particles { display: none !important; }
      .orb { animation: none !important; }
    }

    /* ─── Responsive ─── */
    @media (max-width: 500px) {
      .login-card { padding: 32px 24px; border-radius: 20px; }
      .login-card h1 { font-size: 24px; }
      .social-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- Particles -->
<canvas id="particles" aria-hidden="true"></canvas>

<!-- Nav -->
<nav>
  <div class="nav-inner">
    <a href="/"><img src="logo-white.svg" alt="TagDev" /></a>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="lang-toggle">
        <button id="btn-en" class="active" onclick="setLang('en')">EN</button>
        <button id="btn-ar" onclick="setLang('ar')">AR</button>
      </div>
      <a href="/" class="nav-back" data-i18n="back_home">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M19 12H5m0 0l7 7m-7-7l7-7"/></svg>
        Back to Home
      </a>
    </div>
  </div>
</nav>

<!-- Login Section -->
<section class="login-section">

  <!-- Background Orbs -->
  <div class="orb" style="top:10%;left:10%;width:400px;height:400px;background:radial-gradient(circle,rgba(43,227,183,.08),transparent 70%);"></div>
  <div class="orb" style="bottom:10%;right:10%;width:500px;height:500px;background:radial-gradient(circle,rgba(0,134,255,.1),transparent 70%);"></div>
  <div class="orb" style="top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:300px;border-radius:50%;background:radial-gradient(ellipse,rgba(17,171,226,.06),transparent 70%);filter:blur(30px);"></div>

  <!-- Login Card -->
  <div class="login-card">
    <div class="badge">
      <span style="width:6px;height:6px;border-radius:50%;background:#2BE3B7;"></span>
      <span data-i18n="login_badge">Welcome Back</span>
    </div>

    <h1 data-i18n-html="login_title">Sign in to <span class="g-text">TagDev</span></h1>
    <p class="sub" data-i18n="login_sub">Access your POS dashboard, manage sales, inventory and reports.</p>

    <!-- Social Login -->
    <div class="social-row">
      <button class="social-btn" type="button">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        <span data-i18n="login_google">Google</span>
      </button>
      <button class="social-btn" type="button">
        <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="11" fill="#1877F2"/><path fill="#fff" d="M16.67 15.47l.53-3.47h-3.33V9.87c0-.95.46-1.87 1.95-1.87h1.51V5.08s-1.37-.23-2.68-.23c-2.73 0-4.52 1.66-4.52 4.66V12H7.07v3.47h3.06V24h3.77v-8.53h2.77z"/></svg>
        <span data-i18n="login_facebook">Facebook</span>
      </button>
    </div>

    <div class="divider"><span data-i18n="login_or">or</span></div>

    <!-- Form -->
    <form onsubmit="return false;">
      <div class="field">
        <label for="email" data-i18n="login_email_label">Email Address</label>
        <div class="input-wrap">
          <input type="email" id="email" data-i18n-placeholder="login_email_ph" placeholder="name@company.com" autocomplete="email" />
        </div>
      </div>

      <div class="field">
        <label for="password" data-i18n="login_pw_label">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" data-i18n-placeholder="login_pw_ph" placeholder="Enter your password" autocomplete="current-password" />
          <button type="button" class="toggle-pw" aria-label="Toggle password visibility" onclick="const p=document.getElementById('password');p.type=p.type==='password'?'text':'password'">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          </button>
        </div>
      </div>

      <div class="options-row">
        <label class="remember"><input type="checkbox" /> <span data-i18n="login_remember">Remember me</span></label>
        <a href="#" class="forgot" data-i18n="login_forgot">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary" data-i18n="login_btn">
        Sign In
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
      </button>
    </form>

    <p class="signup-text"><span data-i18n="login_no_account">Don't have an account?</span> <a href="#" data-i18n="login_signup">Create Account</a></p>
  </div>
</section>

<!-- Footer -->
<div class="login-footer" data-i18n="login_footer" id="login-footer"></div>

<!-- ═══ Language System ═══ -->
<script>
const T = {
  en: {
    back_home: 'Back to Home',
    login_badge: 'Welcome Back',
    login_title: 'Sign in to <span class="g-text">TagDev</span>',
    login_sub: 'Access your POS dashboard, manage sales, inventory and reports.',
    login_google: 'Google',
    login_facebook: 'Facebook',
    login_or: 'or',
    login_email_label: 'Email Address',
    login_email_ph: 'name@company.com',
    login_pw_label: 'Password',
    login_pw_ph: 'Enter your password',
    login_remember: 'Remember me',
    login_forgot: 'Forgot password?',
    login_btn: 'Sign In',
    login_no_account: "Don't have an account?",
    login_signup: 'Create Account',
    login_footer: `Copyright \u00a9 ${new Date().getFullYear()} TagDev. All rights reserved.`,
    login_pw_toggle: 'Toggle password visibility',
  },
  ar: {
    back_home: '\u0627\u0644\u0639\u0648\u062f\u0629 \u0644\u0644\u0631\u0626\u064a\u0633\u064a\u0629',
    login_badge: '\u0645\u0631\u062d\u0628\u0627\u064b \u0628\u0639\u0648\u062f\u062a\u0643',
    login_title: '\u062a\u0633\u062c\u064a\u0644 \u0627\u0644\u062f\u062e\u0648\u0644 \u0625\u0644\u0649 <span class="g-text">TagDev</span>',
    login_sub: '\u0627\u062f\u062e\u0644 \u0625\u0644\u0649 \u0644\u0648\u062d\u0629 \u0627\u0644\u062a\u062d\u0643\u0645 \u0644\u0625\u062f\u0627\u0631\u0629 \u0627\u0644\u0645\u0628\u064a\u0639\u0627\u062a \u0648\u0627\u0644\u0645\u062e\u0632\u0648\u0646 \u0648\u0627\u0644\u062a\u0642\u0627\u0631\u064a\u0631.',
    login_google: '\u062c\u0648\u062c\u0644',
    login_facebook: '\u0641\u064a\u0633\u0628\u0648\u0643',
    login_or: '\u0623\u0648',
    login_email_label: '\u0627\u0644\u0628\u0631\u064a\u062f \u0627\u0644\u0625\u0644\u0643\u062a\u0631\u0648\u0646\u064a',
    login_email_ph: 'name@company.com',
    login_pw_label: '\u0643\u0644\u0645\u0629 \u0627\u0644\u0645\u0631\u0648\u0631',
    login_pw_ph: '\u0623\u062f\u062e\u0644 \u0643\u0644\u0645\u0629 \u0627\u0644\u0645\u0631\u0648\u0631',
    login_remember: '\u062a\u0630\u0643\u0631\u0646\u064a',
    login_forgot: '\u0646\u0633\u064a\u062a \u0643\u0644\u0645\u0629 \u0627\u0644\u0645\u0631\u0648\u0631\u061f',
    login_btn: '\u062a\u0633\u062c\u064a\u0644 \u0627\u0644\u062f\u062e\u0648\u0644',
    login_no_account: '\u0644\u064a\u0633 \u0644\u062f\u064a\u0643 \u062d\u0633\u0627\u0628\u061f',
    login_signup: '\u0625\u0646\u0634\u0627\u0621 \u062d\u0633\u0627\u0628',
    login_footer: `\u062d\u0642\u0648\u0642 \u0627\u0644\u0646\u0634\u0631 \u00a9 ${new Date().getFullYear()} TagDev. \u062c\u0645\u064a\u0639 \u0627\u0644\u062d\u0642\u0648\u0642 \u0645\u062d\u0641\u0648\u0638\u0629.`,
    login_pw_toggle: '\u0625\u0638\u0647\u0627\u0631/\u0625\u062e\u0641\u0627\u0621 \u0643\u0644\u0645\u0629 \u0627\u0644\u0645\u0631\u0648\u0631',
  }
};

function setLang(lang) {
  const t = T[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.title = lang === 'ar' ? 'TagDev \u2014 \u062a\u0633\u062c\u064a\u0644 \u0627\u0644\u062f\u062e\u0648\u0644' : 'TagDev \u2014 Sign In';

  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');

  // Update text
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) {
      const svg = el.querySelector('svg');
      if (svg) {
        const textNode = el.childNodes[0];
        if (textNode && textNode.nodeType === 3) {
          textNode.textContent = t[key] + '\n        ';
        } else {
          el.insertBefore(document.createTextNode(t[key] + '\n        '), svg);
        }
      } else {
        el.textContent = t[key];
      }
    }
  });

  // Update innerHTML (titles with <span>)
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (t[key] !== undefined) el.innerHTML = t[key];
  });

  // Update placeholders
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (t[key] !== undefined) el.placeholder = t[key];
  });

  // Update aria-labels
  const pwBtn = document.querySelector('.toggle-pw');
  if (pwBtn) pwBtn.setAttribute('aria-label', t.login_pw_toggle);

  localStorage.setItem('tagdev-lang', lang);
}

// Auto-detect saved language from landing page
const savedLang = localStorage.getItem('tagdev-lang');
if (savedLang && savedLang !== 'en') setLang(savedLang);
</script>

<!-- Particles Script -->
<script>
(function(){
  const c = document.getElementById('particles');
  if (!c || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const ctx = c.getContext('2d');
  let w, h, pts = [], animId = null;
  const count = window.innerWidth < 768 ? 12 : 30;
  function resize(){ w = c.width = innerWidth; h = c.height = innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for (let i = 0; i < count; i++) {
    pts.push({ x: Math.random()*w, y: Math.random()*h, r: Math.random()*1.2+.4,
      dx: (Math.random()-.5)*.25, dy: (Math.random()-.5)*.25,
      o: Math.random()*.35+.08 });
  }
  function draw(){
    ctx.clearRect(0,0,w,h);
    pts.forEach(p => {
      p.x += p.dx; p.y += p.dy;
      if(p.x<0) p.x=w; if(p.x>w) p.x=0;
      if(p.y<0) p.y=h; if(p.y>h) p.y=0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(17,171,226,${p.o})`;
      ctx.fill();
    });
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<130){
          ctx.beginPath();
          ctx.moveTo(pts[i].x,pts[i].y);
          ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`rgba(43,227,183,${.05*(1-d/130)})`;
          ctx.lineWidth=.5;
          ctx.stroke();
        }
      }
    }
    animId = requestAnimationFrame(draw);
  }
  draw();
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { cancelAnimationFrame(animId); animId = null; }
    else if (!animId) draw();
  });
})();
</script>

</body>
